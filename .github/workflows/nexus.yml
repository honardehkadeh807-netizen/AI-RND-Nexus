name: Dark Nexus Execution

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-nexus:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Decrypt and Run Nexus (In RAM Execution)
      env:
        MASTER_KEY: ${{ secrets.MASTER_KEY }}
        GEMINI_KEYS: ${{ secrets.GEMINI_KEYS }}
        GROQ_KEYS: ${{ secrets.GROQ_KEYS }}
        OPENROUTER_KEYS: ${{ secrets.OPENROUTER_KEYS }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        import os, base64, hashlib, zipfile
        from cryptography.fernet import Fernet
        
        key = base64.urlsafe_b64encode(hashlib.sha256(os.environ['MASTER_KEY'].encode()).digest())
        cipher = Fernet(key)
        
        with open('core.enc', 'rb') as f:
            decrypted_data = cipher.decrypt(f.read())
        with open('temp_core.zip', 'wb') as f:
            f.write(decrypted_data)
            
        with zipfile.ZipFile('temp_core.zip', 'r') as zip_ref:
            zip_ref.extractall('live_core')
            
        os.remove('temp_core.zip')
        "
        cd live_core
        cp ../state.locked ./ || echo "{}" > state.locked
        python main.py
        cp state.locked ../

    - name: Commit Updated State (Checkpointing)
      run: |
        git config --global user.name "Nexus Bot"
        git config --global user.email "bot@nexus.local"
        git add state.locked
        git commit -m "System Sync: Update memory state" || echo "No changes to state"
        git push
